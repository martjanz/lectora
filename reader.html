<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    :root {
      --bg: #fafaf8;
      --text: #1a1a1a;
      --border: #d1d5db;
      --bar-bg: #f3f4f6;
      --accent: #4b5563;
      --font-size: 18px;
    }
    body[data-dark="true"] {
      --bg: #1a1a1a;
      --text: #e8e4d8;
      --border: #374151;
      --bar-bg: #111111;
      --accent: #9ca3af;
    }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }

    #drop-area {
      position: fixed; inset: 0; margin: 2rem;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      cursor: pointer; border: 2px dashed var(--border); border-radius: 8px;
    }
    #drop-area.drag-over { background: color-mix(in srgb, var(--border) 20%, transparent); }
    #drop-area .hint { font-size: 13px; color: var(--accent); }

    #error-popup {
      position: fixed; inset: 0; z-index: 200;
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    #error-box {
      background: var(--bg); border: 1px solid var(--border);
      padding: 1.5rem; border-radius: 8px; max-width: 400px; width: 90%;
    }
    #error-box p { font-size: 12px; color: var(--accent); font-family: monospace; margin: 8px 0 0; word-break: break-all; }
    #error-close { margin-top: 1rem; padding: 4px 12px; cursor: pointer; }

    #viewer-container { position: fixed; inset: 0; display: none; }
    #reader { position: fixed; inset: 0; display: none; flex-direction: column; }
  </style>
  <script src="./Annas-viewer_files/react.production.min.js"></script>
  <script src="./Annas-viewer_files/react-dom.production.min.js"></script>
  <script src="./Annas-viewer_files/reakit.min.js"></script>
  <script src="./Annas-viewer_files/djvu.js"></script>
  <script src="./Annas-viewer_files/djvu_viewer.js"></script>
  <script>window.reakit = window.Reakit;</script>
  <script src="./Annas-viewer_files/villain.js"></script>
  <script src="./Annas-viewer_files/zip.min.js"></script>
</head>
<body>

<div id="drop-area">
  <div>Drop a file here to open (or click)</div>
  <div class="hint">Supported: pdf · epub · fb2 · mobi · azw3 · djvu · cbz · cbr · rar · zip</div>
  <input type="file" id="file-input" accept=".pdf,.epub,.fb2,.mobi,.azw3,.djvu,.cbz,.cbr,.rar,.zip" style="display:none">
</div>

<div id="error-popup">
  <div id="error-box">
    <div style="font-weight:600;margin-bottom:8px">Error opening file</div>
    <div>There may be a problem with this file. Try a different application.</div>
    <p id="error-message"></p>
    <button id="error-close">Close</button>
  </div>
</div>

<div id="viewer-container"></div>
<div id="reader"><!-- filled in Task 3 --></div>

<script>
  const SUPPORTED = {
    pdfjs:     ['pdf'],
    foliatejs: ['epub', 'fb2', 'mobi', 'azw3'],
    djvujs:    ['djvu'],
    kthoom:    ['cbz', 'cbr'],
    villainjs: ['rar', 'zip'],
  };

  function displayError(msg) {
    document.getElementById('error-message').textContent = msg;
    document.getElementById('error-popup').style.display = 'flex';
  }
  document.getElementById('error-close').addEventListener('click', () => {
    document.getElementById('error-popup').style.display = 'none';
  });

  function showViewer() {
    document.getElementById('drop-area').style.display = 'none';
    document.getElementById('viewer-container').style.display = 'block';
  }

  function attachFrameListener() {
    const iframe = document.querySelector('.viewer-frame');
    const w = iframe.contentWindow;
    w.addEventListener('unhandledrejection', e => displayError(e.reason.message));
    w.addEventListener('error', e => displayError((e.error || e).message));
    try {
      w.EventTarget.prototype.addEventListener = new Proxy(w.EventTarget.prototype.addEventListener, {
        apply(target, that, args) {
          if (args[0] === 'drop') return;
          return Reflect.apply(...arguments);
        }
      });
    } catch (_) {}
  }

  function loadWithVillain(file) {
    showViewer();
    const root = ReactDOM.createRoot(document.getElementById('viewer-container'));
    root.render(React.createElement(window.villain, {
      source: file,
      style: { width: '100%', height: '100%' },
      options: { allowFullScreen: true, autoHideControls: false },
      workerUrl: '/libarchivejs/libarchivejs-1.3.0/dist/worker-bundle.js',
    }));
  }

  async function loadDjvuByFile(file) {
    showViewer();
    const buf = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = () => rej(r.error);
      r.readAsArrayBuffer(file);
    });
    const viewer = new DjVu.Viewer();
    viewer.render(document.getElementById('viewer-container'));
    viewer.loadDocument(buf);
  }

  window.fileInfoForMonkeyPatchedFetchFile = {};
  window.fetchFile = async url => {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    const info = window.fileInfoForMonkeyPatchedFetchFile;
    if (url.startsWith('blob:') && info.name && info.type)
      return new File([await res.blob()], info.name, { type: info.type });
    return new File([await res.blob()], new URL(res.url).pathname);
  };
  window.onmessage = e => {
    const f = document.getElementById('foliate-iframe');
    if (e.data === 'refocus-iframe' && f) f.contentWindow.focus();
  };

  async function loadViewerByUrl(url, ext) {
    const vc = document.getElementById('viewer-container');
    if (SUPPORTED.pdfjs.includes(ext)) {
      showViewer();
      vc.innerHTML = `<iframe src="/pdfjs/web/viewer.html?file=${encodeURI(url)}" class="viewer-frame" style="width:100%;height:100%;border:none"></iframe>`;
      attachFrameListener();
    } else if (SUPPORTED.foliatejs.includes(ext)) {
      showViewer();
      vc.innerHTML = `<iframe id="foliate-iframe" src="/foliatejs/reader.html?url=${encodeURI(url)}" class="viewer-frame" style="width:100%;height:100%;border:none"></iframe>`;
      attachFrameListener();
    } else if (SUPPORTED.kthoom.includes(ext)) {
      showViewer();
      vc.innerHTML = `<iframe src="/kthoom/index.html?bookUri=${encodeURI(url)}" class="viewer-frame" style="width:100%;height:100%;border:none"></iframe>`;
      attachFrameListener();
    } else if (ext === 'rar') {
      loadWithVillain(url);
    } else if (ext === 'zip') {
      const blob = await (await fetch(url)).blob();
      await loadZipOrBook(blob, '');
    } else {
      displayError('File type not supported');
    }
  }

  async function handleFileUpload(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (SUPPORTED.djvujs.includes(ext)) {
      await loadDjvuByFile(file);
      return;
    }
    window.fileInfoForMonkeyPatchedFetchFile = { name: file.name, type: file.type };
    if (ext === 'zip') {
      const buf = await file.arrayBuffer();
      const blob = new Blob([buf], { type: file.type });
      await loadZipOrBook(blob, file.name);
    } else {
      await loadViewerByUrl(URL.createObjectURL(file), ext);
    }
  }

  // Stub — replaced in Task 2
  async function loadZipOrBook(blob, filename) {
    loadWithVillain(blob);
  }

  window.addEventListener('error', e => displayError(e.error?.message || e.message));
  window.addEventListener('unhandledrejection', e => displayError(e.reason?.message || e.reason));

  document.addEventListener('DOMContentLoaded', () => {
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('file-input');
    dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
    dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
    dropArea.addEventListener('drop', e => {
      e.preventDefault();
      dropArea.classList.remove('drag-over');
      const files = e.dataTransfer.files;
      if (files.length > 1) { displayError('Please upload only one file.'); return; }
      if (files.length > 0) handleFileUpload(files[0]);
    });
    dropArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) handleFileUpload(fileInput.files[0]);
    });
  });
</script>
</body>
</html>
