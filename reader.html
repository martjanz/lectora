<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    :root {
      --bg: #fafaf8;
      --text: #1a1a1a;
      --border: #d1d5db;
      --bar-bg: #f3f4f6;
      --accent: #4b5563;
      --font-size: 18px;
    }
    body[data-dark="true"] {
      --bg: #1a1a1a;
      --text: #e8e4d8;
      --border: #374151;
      --bar-bg: #111111;
      --accent: #9ca3af;
    }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }

    #drop-area {
      position: fixed; inset: 0; margin: 2rem;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      cursor: pointer; border: 2px dashed var(--border); border-radius: 8px;
    }
    #drop-area.drag-over { background: color-mix(in srgb, var(--border) 20%, transparent); }
    #drop-area .hint { font-size: 13px; color: var(--accent); }

    #error-popup {
      position: fixed; inset: 0; z-index: 200;
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    #error-box {
      background: var(--bg); border: 1px solid var(--border);
      padding: 1.5rem; border-radius: 8px; max-width: 400px; width: 90%;
    }
    #error-box p { font-size: 12px; color: var(--accent); font-family: monospace; margin: 8px 0 0; word-break: break-all; }
    #error-close { margin-top: 1rem; padding: 4px 12px; cursor: pointer; }

    #viewer-container { position: fixed; inset: 0; display: none; }
    #reader { position: fixed; inset: 0; display: none; flex-direction: column; }

    button.reader-btn {
      background: none; border: 1px solid var(--border); color: var(--text);
      padding: 3px 9px; border-radius: 4px; cursor: pointer; font-size: 13px; white-space: nowrap;
    }
    button.reader-btn:hover { background: var(--border); }

    #reader-header {
      height: 48px; flex-shrink: 0;
      display: flex; align-items: center; gap: 8px; padding: 0 12px;
      background: var(--bar-bg); border-bottom: 1px solid var(--border);
    }
    #reader-title { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #reader-page-info { font-size: 13px; color: var(--accent); white-space: nowrap; }

    #page-area { flex: 1; overflow: hidden; position: relative; }
    #page-left-zone, #page-right-zone {
      position: absolute; top: 0; bottom: 0; width: 15%; z-index: 1; cursor: pointer;
    }
    #page-left-zone { left: 0; }
    #page-right-zone { right: 0; }

    #page-content {
      position: absolute; inset: 0; overflow-y: auto;
      padding: 2.5rem 2rem;
      font-size: var(--font-size);
    }
    #page-content.prose {
      font-family: Georgia, ui-serif, serif;
      line-height: 1.7;
    }
    #page-content.prose p {
      max-width: 65ch; margin: 0 auto 1em;
    }
    #page-content.faithful {
      font-family: ui-monospace, 'Courier New', monospace;
      white-space: pre-wrap; line-height: 1.6;
    }
    #page-content.faithful pre {
      max-width: 80ch; margin: 0 auto;
    }

    #reader-footer {
      height: 44px; flex-shrink: 0;
      display: flex; align-items: center; gap: 8px; padding: 0 12px;
      background: var(--bar-bg); border-top: 1px solid var(--border);
    }
    #progress-bar-container {
      flex: 1; height: 6px; background: var(--border); border-radius: 3px; cursor: pointer;
    }
    #progress-bar { height: 100%; background: var(--accent); border-radius: 3px; width: 0%; transition: width 0.1s; }
    #kb-hint { font-size: 11px; color: var(--accent); }
  </style>
  <script src="./Annas-viewer_files/react.production.min.js"></script>
  <script src="./Annas-viewer_files/react-dom.production.min.js"></script>
  <script src="./Annas-viewer_files/reakit.min.js"></script>
  <script src="./Annas-viewer_files/djvu.js"></script>
  <script src="./Annas-viewer_files/djvu_viewer.js"></script>
  <script>window.reakit = window.Reakit;</script>
  <script src="./Annas-viewer_files/villain.js"></script>
  <script src="./Annas-viewer_files/zip.min.js"></script>
</head>
<body>

<div id="drop-area">
  <div>Drop a file here to open (or click)</div>
  <div class="hint">Supported: pdf · epub · fb2 · mobi · azw3 · djvu · cbz · cbr · rar · zip</div>
  <input type="file" id="file-input" accept=".pdf,.epub,.fb2,.mobi,.azw3,.djvu,.cbz,.cbr,.rar,.zip" style="display:none">
</div>

<div id="error-popup">
  <div id="error-box">
    <div style="font-weight:600;margin-bottom:8px">Error opening file</div>
    <div>There may be a problem with this file. Try a different application.</div>
    <p id="error-message"></p>
    <button id="error-close">Close</button>
  </div>
</div>

<div id="viewer-container"></div>
<div id="reader">
  <header id="reader-header">
    <span id="reader-title"></span>
    <span id="reader-page-info"></span>
    <button class="reader-btn" id="mode-btn">Prose</button>
    <button class="reader-btn" id="font-dec">−</button>
    <button class="reader-btn" id="font-inc">+</button>
    <button class="reader-btn" id="dark-btn">☀</button>
  </header>
  <div id="page-area">
    <div id="page-left-zone"></div>
    <div id="page-content"></div>
    <div id="page-right-zone"></div>
  </div>
  <footer id="reader-footer">
    <button class="reader-btn" id="prev-btn">←</button>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    <button class="reader-btn" id="next-btn">→</button>
    <span id="kb-hint">← → · h l · space · f: mode · d: dark · +−: font</span>
  </footer>
</div>

<script>
  const SUPPORTED = {
    pdfjs:     ['pdf'],
    foliatejs: ['epub', 'fb2', 'mobi', 'azw3'],
    djvujs:    ['djvu'],
    kthoom:    ['cbz', 'cbr'],
    villainjs: ['rar', 'zip'],
  };

  function displayError(msg) {
    document.getElementById('error-message').textContent = msg;
    document.getElementById('error-popup').style.display = 'flex';
  }
  document.getElementById('error-close').addEventListener('click', () => {
    document.getElementById('error-popup').style.display = 'none';
  });

  function showViewer() {
    document.getElementById('drop-area').style.display = 'none';
    document.getElementById('viewer-container').style.display = 'block';
  }

  function attachFrameListener() {
    const iframe = document.querySelector('.viewer-frame');
    iframe.addEventListener('load', () => {
      try {
        const w = iframe.contentWindow;
        w.addEventListener('unhandledrejection', e => displayError(e.reason?.message));
        w.addEventListener('error', e => displayError((e.error || e).message));
        w.EventTarget.prototype.addEventListener = new Proxy(w.EventTarget.prototype.addEventListener, {
          apply(target, that, args) {
            if (args[0] === 'drop') return;
            return Reflect.apply(...arguments);
          }
        });
      } catch (_) {}
    });
  }

  function loadWithVillain(file) {
    showViewer();
    const root = ReactDOM.createRoot(document.getElementById('viewer-container'));
    root.render(React.createElement(window.villain, {
      source: file,
      style: { width: '100%', height: '100%' },
      options: { allowFullScreen: true, autoHideControls: false },
      workerUrl: '/libarchivejs/libarchivejs-1.3.0/dist/worker-bundle.js',
    }));
  }

  async function loadDjvuByFile(file) {
    showViewer();
    const buf = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = () => rej(r.error);
      r.readAsArrayBuffer(file);
    });
    const viewer = new DjVu.Viewer();
    viewer.render(document.getElementById('viewer-container'));
    viewer.loadDocument(buf);
  }

  window.fileInfoForMonkeyPatchedFetchFile = {};
  window.fetchFile = async url => {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    const info = window.fileInfoForMonkeyPatchedFetchFile;
    if (url.startsWith('blob:') && info.name && info.type)
      return new File([await res.blob()], info.name, { type: info.type });
    return new File([await res.blob()], new URL(res.url).pathname);
  };
  window.addEventListener('message', e => {
    const f = document.getElementById('foliate-iframe');
    if (e.data === 'refocus-iframe' && f) f.contentWindow.focus();
  });

  async function loadViewerByUrl(url, ext) {
    const vc = document.getElementById('viewer-container');
    if (SUPPORTED.pdfjs.includes(ext)) {
      showViewer();
      vc.innerHTML = `<iframe src="/pdfjs/web/viewer.html?file=${encodeURI(url)}" class="viewer-frame" style="width:100%;height:100%;border:none"></iframe>`;
      attachFrameListener();
    } else if (SUPPORTED.foliatejs.includes(ext)) {
      showViewer();
      vc.innerHTML = `<iframe id="foliate-iframe" src="/foliatejs/reader.html?url=${encodeURI(url)}" class="viewer-frame" style="width:100%;height:100%;border:none"></iframe>`;
      attachFrameListener();
    } else if (SUPPORTED.kthoom.includes(ext)) {
      showViewer();
      vc.innerHTML = `<iframe src="/kthoom/index.html?bookUri=${encodeURI(url)}" class="viewer-frame" style="width:100%;height:100%;border:none"></iframe>`;
      attachFrameListener();
    } else if (ext === 'rar') {
      loadWithVillain(url);
    } else if (ext === 'zip') {
      const blob = await (await fetch(url)).blob();
      await loadZipOrBook(blob, url.split('/').pop() || '');
    } else {
      displayError('File type not supported');
    }
  }

  async function handleFileUpload(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (SUPPORTED.djvujs.includes(ext)) {
      await loadDjvuByFile(file);
      return;
    }
    window.fileInfoForMonkeyPatchedFetchFile = { name: file.name, type: file.type };
    if (ext === 'zip') {
      await loadZipOrBook(file, file.name);
    } else {
      await loadViewerByUrl(URL.createObjectURL(file), ext);
    }
  }

  function extractTitle(filename) {
    // Anna's Archive format: "Title -- Author -- ... -- Anna's Archive.zip"
    const base = filename
      .replace(/\.zip$/i, '')
      .replace(/\s*--\s*Anna['']s Archive\s*$/i, '');
    const parts = base.split(/\s+--\s+/);
    return parts[0].trim() || filename;
  }

  function isBlankPage(text) {
    return text.replace(/\s/g, '').length < 10;
  }

  async function loadZipOrBook(blob, filename) {
    const reader = new zip.ZipReader(new zip.BlobReader(blob));
    try {
      let entries = await reader.getEntries();
      entries.sort((a, b) => a.filename.localeCompare(b.filename));

      if (entries.length === 0) { displayError('Zip file is empty.'); return; }
      if (!entries.every(e => !e.directory && e.filename.endsWith('.txt'))) {
        loadWithVillain(new File([blob], filename || 'archive.zip', { type: blob.type }));
        return;
      }

      const pages = [];
      for (const entry of entries) {
        const text = await entry.getData(new zip.TextWriter());
        if (!isBlankPage(text)) pages.push(text);
      }

      if (pages.length === 0) { displayError('No readable pages found in this zip.'); return; }

      const title = extractTitle(filename);
      showReader(pages, filename, title);
    } finally {
      await reader.close();
    }
  }

  function showReader(pages, filename, title) {
    document.getElementById('drop-area').style.display = 'none';
    document.getElementById('reader').style.display = 'flex';
    document.getElementById('reader-title').textContent = title;
    document.getElementById('reader-page-info').textContent = `1 / ${pages.length}`;
    document.getElementById('page-content').textContent = pages[0] || '';
  }

  window.addEventListener('error', e => displayError(e.error?.message || e.message));
  window.addEventListener('unhandledrejection', e => displayError(e.reason?.message || e.reason));

  document.addEventListener('DOMContentLoaded', () => {
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('file-input');
    dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
    dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
    dropArea.addEventListener('drop', e => {
      e.preventDefault();
      dropArea.classList.remove('drag-over');
      const files = e.dataTransfer.files;
      if (files.length > 1) { displayError('Please upload only one file.'); return; }
      if (files.length > 0) handleFileUpload(files[0]);
    });
    dropArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) handleFileUpload(fileInput.files[0]);
    });
  });
</script>
</body>
</html>
